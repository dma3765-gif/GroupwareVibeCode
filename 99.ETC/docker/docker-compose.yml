version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: groupware-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: groupware
      MONGO_INITDB_ROOT_PASSWORD: groupware1234!
      MONGO_INITDB_DATABASE: groupware
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - groupware-net

  mongo-express:
    image: mongo-express:1.0.2
    container_name: groupware-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: groupware
      ME_CONFIG_MONGODB_ADMINPASSWORD: groupware1234!
      ME_CONFIG_MONGODB_URL: mongodb://groupware:groupware1234!@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - groupware-net

  redis:
    image: redis:7.2-alpine
    container_name: groupware-redis
    restart: unless-stopped
    command: redis-server --requirepass redis1234!
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - groupware-net

volumes:
  mongodb_data:
  redis_data:

networks:
  groupware-net:
    driver: bridge
